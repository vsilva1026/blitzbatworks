    :root {

    [data-theme="forest-gold"]   { --primary:#1b3a2b; --primary-dark:#0f2318; --accent:#e0a020; --accent-ink:#8a6110; --bg:#f4ecd8; --card:#ffffff; --ink:#1a1a1a; --muted:#6b6b6b; --btn-ink:#1b3a2b; }
    [data-theme="black-yellow"]  { --primary:#111111; --primary-dark:#000000; --accent:#ffcc00; --accent-ink:#8a6c00; --bg:#f2f2f2; --card:#ffffff; --ink:#1a1a1a; --muted:#6b6b6b; --btn-ink:#111111; }
    [data-theme="royal-orange"]  { --primary:#1e3a8a; --primary-dark:#152a63; --accent:#f97316; --accent-ink:#c2410c; --bg:#f0f4ff; --card:#ffffff; --ink:#1a1a1a; --muted:#6b6b6b; --btn-ink:#ffffff; }
    [data-theme="maroon-cream"]  { --primary:#5e1522; --primary-dark:#3d0d16; --accent:#c9a96e; --accent-ink:#8a6b2c; --bg:#f8f1e3; --card:#ffffff; --ink:#1a1a1a; --muted:#6b6b6b; --btn-ink:#3d0d16; }
    [data-theme="neon-retro"]    { --primary:#1a1033; --primary-dark:#0d0820; --accent:#ff2ec4; --accent-ink:#ff2ec4; --bg:#0d0820; --card:#1a1033; --ink:#f0eaff; --muted:#a89dc7; --btn-ink:#0d0820; --on-dark:#f0eaff; --heading-font:'Press Start 2P','Bebas Neue',sans-serif; }
    /* New themes */

    [data-theme="ocean-teal"]    { --primary:#0d3f4a; --primary-dark:#082830; --accent:#f0b642; --accent-ink:#8a6110; --bg:#eaf3f5; --card:#ffffff; --ink:#0f1e22; --muted:#5b7076; --btn-ink:#0d3f4a; }
    [data-theme="dodger-blue"]   { --primary:#0a2540; --primary-dark:#061729; --accent:#ff6b1a; --accent-ink:#c2410c; --bg:#eef2f7; --card:#ffffff; --ink:#1a1a1a; --muted:#5b6270; --btn-ink:#ffffff; }
    [data-theme="pistachio"]     { --primary:#3d5c3a; --primary-dark:#243821; --accent:#ff8c42; --accent-ink:#c2410c; --bg:#eaf1e0; --card:#ffffff; --ink:#1a1a1a; --muted:#5b6b58; --btn-ink:#ffffff; }
    [data-theme="hot-pink"]      { --primary:#111111; --primary-dark:#000000; --accent:#ff3d8a; --accent-ink:#c2185b; --bg:#fff0f6; --card:#ffffff; --ink:#1a1a1a; --muted:#6b6b6b; --btn-ink:#ffffff; }
    [data-theme="sunset"]        { --primary:#5b1a5b; --primary-dark:#380d38; --accent:#ff9a3d; --accent-ink:#c2410c; --bg:#fff1e6; --card:#ffffff; --ink:#1f0f1f; --muted:#6b5560; --btn-ink:#ffffff; }
    [data-theme="candy-red"]     { --primary:#c8102e; --primary-dark:#8a0b20; --accent:#0f2a44; --accent-ink:#0a1d30; --bg:#ffffff; --card:#f9f6f0; --ink:#1a1a1a; --muted:#6b6b6b; --btn-ink:#ffffff; }
    [data-theme="army-camo"]     { --primary:#3c4a2f; --primary-dark:#242e1c; --accent:#d7522b; --accent-ink:#a63d1a; --bg:#e8e6d2; --card:#f4f2de; --ink:#1a1a1a; --muted:#5b6055; --btn-ink:#ffffff; }
    [data-theme="ice-blue"]      { --primary:#1e2b3d; --primary-dark:#0f1a29; --accent:#e91e63; --accent-ink:#a01248; --bg:#e6f1fa; --card:#ffffff; --ink:#0f1a29; --muted:#5b6270; --btn-ink:#ffffff; }
    [data-theme="midnight"]      { --primary:#0a0a0a; --primary-dark:#000000; --accent:#3ddc84; --accent-ink:#3ddc84; --bg:#0f0f0f; --card:#1a1a1a; --ink:#f0f0f0; --muted:#8a8a8a; --btn-ink:#000000; --on-dark:#f0f0f0; }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--body-font);
      color: var(--ink);
      background: var(--bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, .display {
      font-family: var(--heading-font);
      letter-spacing: 0.02em;
      line-height: 1.05;
    }
    [data-theme="neon-retro"] h1, [data-theme="neon-retro"] h2, [data-theme="neon-retro"] h3 { line-height: 1.4; letter-spacing: 0; }
    a { color: inherit; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

    nav {
      position: sticky; top: 0; z-index: 10;
      background: var(--primary);
      color: var(--on-dark);
      padding: 16px 0;
      border-bottom: 3px solid var(--accent);
    }
    nav .container { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: var(--heading-font); font-size: 28px; letter-spacing: 0.08em; }
    [data-theme="neon-retro"] .logo { font-size: 14px; }
    .logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 28px; flex-wrap: wrap; }
    .nav-links a { text-decoration: none; font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; }
    .nav-links a:hover { color: var(--accent); }
    @media (max-width: 700px) { .nav-links { display: none; } }

    /* Spacing tokens */
    section { padding: 96px 0; }
    section[data-spacing="compact"] { padding: 48px 0; }
    section[data-spacing="normal"] { padding: 80px 0; }
    section[data-spacing="spacious"] { padding: 120px 0; }
    section[data-spacing="xspacious"] { padding: 180px 0; }

    /* Section backgrounds */
    section[data-bg="light"] { background: var(--card); color: var(--ink); }
    section[data-bg="light"] h2 { color: var(--primary); }
    /* Dark themes: use --ink instead of --primary for H2s on "light" sections,
       since their --primary is near-black and would disappear on the dark card. */
    [data-theme="midnight"] section[data-bg="light"] h2,
    [data-theme="neon-retro"] section[data-bg="light"] h2 { color: var(--ink); }
    [data-theme="midnight"] section[data-bg="light"] h3,
    [data-theme="neon-retro"] section[data-bg="light"] h3 { color: var(--ink); }
    [data-theme="midnight"] .product-card h3,
    [data-theme="neon-retro"] .product-card h3 { color: var(--accent); }
    [data-theme="midnight"] .featured-inner h3,
    [data-theme="neon-retro"] .featured-inner h3 { color: var(--accent); }
    section[data-bg="dark"] { background: var(--primary); color: var(--on-dark); }
    section[data-bg="dark"] h2, section[data-bg="dark"] h3 { color: var(--on-dark); }
    [data-theme="neon-retro"] section[data-bg="dark"] h2 { color: var(--accent); }
    section[data-bg="accent"] { background: var(--accent); color: var(--btn-ink); }
    section[data-bg="accent"] h2, section[data-bg="accent"] h3 { color: var(--btn-ink); }
    section[data-bg="accent"] .btn { background: var(--primary); color: #fff; }

    /* Alignment */
    section[data-align="center"] .container { text-align: center; }
    section[data-align="center"] .container > * { margin-left: auto; margin-right: auto; }
    section[data-align="right"] .container { text-align: right; }
    section[data-align="right"] .container > * { margin-left: auto; }

    .hero {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: var(--on-dark);
      padding: 96px 0 120px;
      position: relative;
      overflow: hidden;
    }
    .hero[data-spacing="compact"] { padding: 48px 0 60px; }
    .hero[data-spacing="normal"] { padding: 72px 0 96px; }
    .hero[data-spacing="spacious"] { padding: 96px 0 120px; }
    .hero[data-spacing="xspacious"] { padding: 140px 0 180px; }
    .hero[data-align="center"] .hero-content { text-align: center; margin-left: auto; margin-right: auto; }
    .hero[data-align="right"] .hero-content { text-align: right; margin-left: auto; }
    .hero.has-bg::after {
      content: ""; position: absolute; inset: 0;
      background-image: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), var(--hero-bg);
      background-size: cover; background-position: center;
      z-index: 0;
    }
    .hero::before {
      content: ""; position: absolute; top: -50%; right: -20%;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-content { position: relative; max-width: 720px; z-index: 1; }
    .kicker {
      display: inline-block;
      color: var(--accent);
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    /* kicker sits on --primary hero, so --accent (bright) is fine */
    .hero h1 {
      font-size: clamp(56px, 9vw, 108px);
      margin-bottom: 20px;
      line-height: 0.95;
    }
    .hero h1 .lead-in {
      display: block;
      font-size: 0.42em;
      letter-spacing: 0.06em;
      opacity: 0.85;
      margin-bottom: 6px;
      line-height: 1.1;
    }
    .hero h1 .accent {
      color: var(--accent);
      display: block;
    }
    [data-theme="neon-retro"] .hero h1 { font-size: clamp(24px, 4vw, 44px); }
    [data-theme="neon-retro"] .hero h1 .lead-in { font-size: 0.5em; }
    .hero .subtext {
      font-size: 20px; max-width: 560px; opacity: 0.9; margin-bottom: 36px;
    }
    .hero .subtext p { margin-bottom: 12px; }
    .hero .subtext a { color: var(--accent); text-decoration: underline; }
    .btn {
      display: inline-block;
      background: var(--accent);
      color: var(--btn-ink);
      padding: 16px 32px;
      text-decoration: none;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 14px;
      border-radius: 4px;
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .btn:hover { filter: brightness(0.9); transform: translateY(-2px); }
    .btn.secondary { background: transparent; border: 2px solid var(--on-dark); color: var(--on-dark); margin-left: 12px; }
    .btn.secondary:hover { background: var(--on-dark); color: var(--primary); }

    .section-label {
      color: var(--accent-ink);
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    /* On dark/accent backgrounds, use the bright variant */
    section[data-bg="dark"] .section-label { color: var(--accent); }
    section[data-bg="accent"] .section-label { color: var(--btn-ink); opacity: 0.85; }
    section h2 {
      font-size: clamp(40px, 6vw, 64px);
      color: var(--primary);
      margin-bottom: 32px;
    }
    [data-theme="neon-retro"] section h2 { font-size: clamp(20px, 3vw, 32px); color: var(--accent); }

    .about-grid {
      display: grid; grid-template-columns: 1.2fr 1fr;
      gap: 64px; align-items: center;
    }
    @media (max-width: 800px) { .about-grid { grid-template-columns: 1fr; gap: 40px; } }
    .rich-body p { font-size: 18px; margin-bottom: 20px; }
    .rich-body ul, .rich-body ol { margin: 0 0 20px 24px; font-size: 18px; }
    .rich-body a { color: var(--accent-ink); text-decoration: underline; }
    section[data-bg="dark"] .rich-body a, section[data-bg="accent"] .rich-body a { color: var(--accent); }
    .rich-body strong { font-weight: 800; }
    .about-card {
      background: var(--primary);
      color: var(--on-dark);
      padding: 40px;
      border-radius: 8px;
      border-left: 6px solid var(--accent);
    }
    section[data-bg="dark"] .about-card { background: var(--primary-dark); }
    section[data-bg="accent"] .about-card { background: var(--primary); }
    .about-card h3 { font-size: 32px; margin-bottom: 20px; color: var(--on-dark); }
    [data-theme="neon-retro"] .about-card h3 { font-size: 16px; }
    .stat-row { display: flex; gap: 32px; margin-top: 24px; flex-wrap: wrap; }
    .stat .num { font-family: var(--heading-font); font-size: 44px; color: var(--accent); line-height: 1; }
    [data-theme="neon-retro"] .stat .num { font-size: 20px; }
    .stat .lbl { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.8; }

    .featured-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; }
    @media (max-width: 800px) { .featured-inner { grid-template-columns: 1fr; } }
    .featured-photo { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 8px; border: 4px solid var(--accent); background: rgba(0,0,0,0.05); }
    .featured-inner h3 { font-size: 42px; color: var(--primary); margin-bottom: 16px; }
    [data-theme="neon-retro"] .featured-inner h3 { font-size: 20px; color: var(--accent); }
    section[data-bg="dark"] .featured-inner h3, section[data-bg="accent"] .featured-inner h3 { color: var(--on-dark); }
    .featured-desc { font-size: 18px; opacity: 0.85; }
    .featured-desc p { margin-bottom: 12px; }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      margin-top: 40px;
    }
    .product-card {
      background: var(--bg);
      border-radius: 8px;
      border-top: 4px solid var(--accent);
      overflow: hidden;
      display: flex; flex-direction: column;
    }
    section[data-bg="dark"] .product-card { background: var(--primary-dark); color: var(--on-dark); }
    section[data-bg="accent"] .product-card { background: #fff; color: var(--ink); }
    .product-card .photo { width: 100%; aspect-ratio: 4/3; object-fit: cover; background: rgba(0,0,0,0.05); }
    .product-card .body { padding: 24px 32px 32px; }
    .product-card h3 {
      font-size: 28px; color: var(--primary); margin-bottom: 12px;
    }
    [data-theme="neon-retro"] .product-card h3 { font-size: 14px; color: var(--accent); }
    section[data-bg="dark"] .product-card h3 { color: var(--accent); }
    .product-card .rich-body p { color: var(--muted); font-size: 15px; margin-bottom: 8px; }
    section[data-bg="dark"] .product-card .rich-body p { color: var(--on-dark); opacity: 0.8; }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 40px;
    }
    .gallery-grid img {
      width: 100%; aspect-ratio: 1;
      object-fit: cover;
      border-radius: 6px;
      border: 3px solid var(--card);
      transition: transform 0.2s ease;
    }
    .gallery-grid img:hover { transform: scale(1.03); }
    .gallery-subtext { max-width: 560px; font-size: 18px; opacity: 0.75; }

    .testi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-top: 40px;
    }
    .testi-card {
      background: var(--bg);
      padding: 32px;
      border-radius: 8px;
      border-left: 4px solid var(--accent);
    }
    section[data-bg="dark"] .testi-card { background: var(--primary-dark); }
    section[data-bg="accent"] .testi-card { background: #fff; color: var(--ink); }
    .testi-card blockquote {
      font-size: 18px; font-style: italic; margin-bottom: 16px;
    }
    .testi-card blockquote p { margin-bottom: 8px; }
    .testi-card .who {
      font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent-ink); font-weight: 800;
    }
    section[data-bg="dark"] .testi-card .who { color: var(--accent); }

    .contact-wrap { max-width: 560px; }
    section[data-align="center"] .contact-wrap { margin: 0 auto; }
    .contact-subtext { font-size: 18px; margin-bottom: 32px; opacity: 0.9; }
    .contact-subtext p { margin-bottom: 12px; }
    form { display: grid; gap: 16px; text-align: left; }
    label { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 800; }
    input, textarea {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: inherit;
      font-family: inherit;
      font-size: 16px;
    }
    section[data-bg="light"] input, section[data-bg="light"] textarea {
      background: rgba(0,0,0,0.03);
      border-color: rgba(0,0,0,0.15);
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); }
    textarea { resize: vertical; min-height: 120px; }
    form .btn { border: none; cursor: pointer; margin-top: 8px; justify-self: start; }

    footer {
      background: var(--primary-dark);
      color: var(--on-dark);
      padding: 32px 0;
      text-align: center;
      font-size: 14px;
    }
    footer .logo { font-size: 20px; margin-bottom: 12px; display: block; }
    .social-row { margin: 12px 0; display: flex; justify-content: center; gap: 20px; }
    .social-row a { color: var(--on-dark); text-decoration: none; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 800; opacity: 0.8; }
    .social-row a:hover { color: var(--accent); opacity: 1; }
    .footer-tag { opacity: 0.6; }
  </style>
</head>

    <noscript>
      <section style="padding:48px 24px;max-width:800px;margin:0 auto;">
        <h2>Custom Hand-Taped Wiffle Ball Bats</h2>
        <p>Blitz Bat Works makes one-of-a-kind wiffle ball bats, wrapped and taped by hand. Every bat is built to your specs — pick your colors, patterns, and grip style. Perfect for backyard baseball, home run derbies, family tournaments, and neighborhood pickup games.</p>
