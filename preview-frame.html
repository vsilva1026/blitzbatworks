<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blitz Bat Works — Custom Taped Wiffle Ball Bats</title>
  <meta name="description" content="Hand-taped custom wiffle ball bats built for backyard legends." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0f2a44;
      --primary-dark: #0a1d30;
      --accent: #d7263d;
      --bg: #f5efe0;
      --ink: #1a1a1a;
      --muted: #6b6b6b;
      --card: #ffffff;
      --heading-font: 'Bebas Neue', 'Inter', sans-serif;
      --body-font: 'Inter', system-ui, -apple-system, sans-serif;
    }
    [data-theme="navy-red"] { --primary:#0f2a44; --primary-dark:#0a1d30; --accent:#d7263d; --bg:#f5efe0; --card:#ffffff; }
    [data-theme="forest-gold"] { --primary:#1b3a2b; --primary-dark:#0f2318; --accent:#e0a020; --bg:#f4ecd8; --card:#ffffff; }
    [data-theme="black-yellow"] { --primary:#111111; --primary-dark:#000000; --accent:#ffcc00; --bg:#f2f2f2; --card:#ffffff; }
    [data-theme="royal-orange"] { --primary:#1e3a8a; --primary-dark:#152a63; --accent:#f97316; --bg:#f0f4ff; --card:#ffffff; }
    [data-theme="maroon-cream"] { --primary:#5e1522; --primary-dark:#3d0d16; --accent:#c9a96e; --bg:#f8f1e3; --card:#ffffff; }
    [data-theme="neon-retro"] { --primary:#1a1033; --primary-dark:#0d0820; --accent:#ff2ec4; --bg:#0d0820; --ink:#f0eaff; --muted:#a89dc7; --card:#1a1033; --heading-font:'Press Start 2P','Bebas Neue',sans-serif; }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--body-font);
      color: var(--ink);
      background: var(--bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, .display {
      font-family: var(--heading-font);
      letter-spacing: 0.02em;
      line-height: 1.05;
    }
    [data-theme="neon-retro"] h1, [data-theme="neon-retro"] h2, [data-theme="neon-retro"] h3 { line-height: 1.4; letter-spacing: 0; }
    a { color: inherit; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

    nav {
      position: sticky; top: 0; z-index: 10;
      background: var(--primary);
      color: var(--bg);
      padding: 16px 0;
      border-bottom: 3px solid var(--accent);
    }
    nav .container { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: var(--heading-font); font-size: 28px; letter-spacing: 0.08em; }
    [data-theme="neon-retro"] .logo { font-size: 14px; }
    .logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 28px; flex-wrap: wrap; }
    .nav-links a { text-decoration: none; font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; }
    .nav-links a:hover { color: var(--accent); }
    @media (max-width: 700px) { .nav-links { display: none; } }

    /* Spacing tokens */
    section { padding: 96px 0; }
    section[data-spacing="compact"] { padding: 48px 0; }
    section[data-spacing="normal"] { padding: 80px 0; }
    section[data-spacing="spacious"] { padding: 120px 0; }
    section[data-spacing="xspacious"] { padding: 180px 0; }

    /* Section backgrounds */
    section[data-bg="light"] { background: var(--card); color: var(--ink); }
    section[data-bg="light"] h2 { color: var(--primary); }
    section[data-bg="dark"] { background: var(--primary); color: var(--bg); }
    section[data-bg="dark"] h2, section[data-bg="dark"] h3 { color: var(--bg); }
    [data-theme="neon-retro"] section[data-bg="dark"] h2 { color: var(--accent); }
    section[data-bg="accent"] { background: var(--accent); color: #fff; }
    section[data-bg="accent"] h2, section[data-bg="accent"] h3 { color: #fff; }
    section[data-bg="accent"] .section-label { color: #fff; opacity: 0.9; }
    section[data-bg="accent"] .btn { background: var(--primary); color: #fff; }

    /* Alignment */
    section[data-align="center"] .container { text-align: center; }
    section[data-align="center"] .container > * { margin-left: auto; margin-right: auto; }
    section[data-align="right"] .container { text-align: right; }
    section[data-align="right"] .container > * { margin-left: auto; }

    .hero {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: var(--bg);
      padding: 96px 0 120px;
      position: relative;
      overflow: hidden;
    }
    .hero[data-spacing="compact"] { padding: 48px 0 60px; }
    .hero[data-spacing="normal"] { padding: 72px 0 96px; }
    .hero[data-spacing="spacious"] { padding: 96px 0 120px; }
    .hero[data-spacing="xspacious"] { padding: 140px 0 180px; }
    .hero[data-align="center"] .hero-content { text-align: center; margin-left: auto; margin-right: auto; }
    .hero[data-align="right"] .hero-content { text-align: right; margin-left: auto; }
    .hero.has-bg::after {
      content: ""; position: absolute; inset: 0;
      background-image: var(--hero-bg);
      background-size: cover; background-position: center;
      opacity: 0.25; z-index: 0;
    }
    .hero::before {
      content: ""; position: absolute; top: -50%; right: -20%;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-content { position: relative; max-width: 720px; z-index: 1; }
    .kicker {
      display: inline-block;
      color: var(--accent);
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .hero h1 {
      font-size: clamp(48px, 8vw, 96px);
      margin-bottom: 20px;
    }
    [data-theme="neon-retro"] .hero h1 { font-size: clamp(24px, 4vw, 40px); }
    .hero h1 .accent { color: var(--accent); }
    .hero .subtext {
      font-size: 20px; max-width: 560px; opacity: 0.9; margin-bottom: 36px;
    }
    .hero .subtext p { margin-bottom: 12px; }
    .hero .subtext a { color: var(--accent); text-decoration: underline; }
    .btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      padding: 16px 32px;
      text-decoration: none;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 14px;
      border-radius: 4px;
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .btn:hover { filter: brightness(0.9); transform: translateY(-2px); }
    .btn.secondary { background: transparent; border: 2px solid var(--bg); margin-left: 12px; }
    .btn.secondary:hover { background: var(--bg); color: var(--primary); }

    .section-label {
      color: var(--accent);
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    section h2 {
      font-size: clamp(40px, 6vw, 64px);
      color: var(--primary);
      margin-bottom: 32px;
    }
    [data-theme="neon-retro"] section h2 { font-size: clamp(20px, 3vw, 32px); color: var(--accent); }

    .about-grid {
      display: grid; grid-template-columns: 1.2fr 1fr;
      gap: 64px; align-items: center;
    }
    @media (max-width: 800px) { .about-grid { grid-template-columns: 1fr; gap: 40px; } }
    .rich-body p { font-size: 18px; margin-bottom: 20px; }
    .rich-body ul, .rich-body ol { margin: 0 0 20px 24px; font-size: 18px; }
    .rich-body a { color: var(--accent); text-decoration: underline; }
    .rich-body strong { font-weight: 800; }
    .about-card {
      background: var(--primary);
      color: var(--bg);
      padding: 40px;
      border-radius: 8px;
      border-left: 6px solid var(--accent);
    }
    section[data-bg="dark"] .about-card { background: var(--primary-dark); }
    section[data-bg="accent"] .about-card { background: var(--primary); }
    .about-card h3 { font-size: 32px; margin-bottom: 20px; color: var(--bg); }
    [data-theme="neon-retro"] .about-card h3 { font-size: 16px; }
    .stat-row { display: flex; gap: 32px; margin-top: 24px; flex-wrap: wrap; }
    .stat .num { font-family: var(--heading-font); font-size: 44px; color: var(--accent); line-height: 1; }
    [data-theme="neon-retro"] .stat .num { font-size: 20px; }
    .stat .lbl { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.8; }

    .featured-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; }
    @media (max-width: 800px) { .featured-inner { grid-template-columns: 1fr; } }
    .featured-photo { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 8px; border: 4px solid var(--accent); background: rgba(0,0,0,0.05); }
    .featured-inner h3 { font-size: 42px; color: var(--primary); margin-bottom: 16px; }
    [data-theme="neon-retro"] .featured-inner h3 { font-size: 20px; color: var(--accent); }
    section[data-bg="dark"] .featured-inner h3, section[data-bg="accent"] .featured-inner h3 { color: var(--bg); }
    .featured-desc { font-size: 18px; opacity: 0.85; }
    .featured-desc p { margin-bottom: 12px; }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      margin-top: 40px;
    }
    .product-card {
      background: var(--bg);
      border-radius: 8px;
      border-top: 4px solid var(--accent);
      overflow: hidden;
      display: flex; flex-direction: column;
    }
    section[data-bg="dark"] .product-card { background: var(--primary-dark); color: var(--bg); }
    section[data-bg="accent"] .product-card { background: #fff; color: var(--ink); }
    .product-card .photo { width: 100%; aspect-ratio: 4/3; object-fit: cover; background: rgba(0,0,0,0.05); }
    .product-card .body { padding: 24px 32px 32px; }
    .product-card h3 {
      font-size: 28px; color: var(--primary); margin-bottom: 12px;
    }
    [data-theme="neon-retro"] .product-card h3 { font-size: 14px; color: var(--accent); }
    section[data-bg="dark"] .product-card h3 { color: var(--accent); }
    .product-card .rich-body p { color: var(--muted); font-size: 15px; margin-bottom: 8px; }
    section[data-bg="dark"] .product-card .rich-body p { color: var(--bg); opacity: 0.8; }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 40px;
    }
    .gallery-grid img {
      width: 100%; aspect-ratio: 1;
      object-fit: cover;
      border-radius: 6px;
      border: 3px solid var(--card);
      transition: transform 0.2s ease;
    }
    .gallery-grid img:hover { transform: scale(1.03); }
    .gallery-subtext { max-width: 560px; font-size: 18px; opacity: 0.75; }

    .testi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-top: 40px;
    }
    .testi-card {
      background: var(--bg);
      padding: 32px;
      border-radius: 8px;
      border-left: 4px solid var(--accent);
    }
    section[data-bg="dark"] .testi-card { background: var(--primary-dark); }
    section[data-bg="accent"] .testi-card { background: #fff; color: var(--ink); }
    .testi-card blockquote {
      font-size: 18px; font-style: italic; margin-bottom: 16px;
    }
    .testi-card blockquote p { margin-bottom: 8px; }
    .testi-card .who {
      font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); font-weight: 800;
    }

    .contact-wrap { max-width: 560px; }
    section[data-align="center"] .contact-wrap { margin: 0 auto; }
    .contact-subtext { font-size: 18px; margin-bottom: 32px; opacity: 0.9; }
    .contact-subtext p { margin-bottom: 12px; }
    form { display: grid; gap: 16px; text-align: left; }
    label { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 800; }
    input, textarea {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: inherit;
      font-family: inherit;
      font-size: 16px;
    }
    section[data-bg="light"] input, section[data-bg="light"] textarea {
      background: rgba(0,0,0,0.03);
      border-color: rgba(0,0,0,0.15);
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); }
    textarea { resize: vertical; min-height: 120px; }
    form .btn { border: none; cursor: pointer; margin-top: 8px; justify-self: start; }

    footer {
      background: var(--primary-dark);
      color: var(--bg);
      padding: 32px 0;
      text-align: center;
      font-size: 14px;
    }
    footer .logo { font-size: 20px; margin-bottom: 12px; display: block; }
    .social-row { margin: 12px 0; display: flex; justify-content: center; gap: 20px; }
    .social-row a { color: var(--bg); text-decoration: none; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 800; opacity: 0.8; }
    .social-row a:hover { color: var(--accent); opacity: 1; }
    .footer-tag { opacity: 0.6; }
  </style>
</head>
<body data-theme="navy-red">

  <nav>
    <div class="container">
      <div class="logo">BLITZ<span>·</span>BAT WORKS</div>
      <div class="nav-links" id="nav-links"></div>
    </div>
  </nav>

  <header class="hero" id="hero">
    <div class="container hero-content">
      <span class="kicker" data-c="hero.kicker"></span>
      <h1><span data-c="hero.headline_top"></span><br><span class="accent" data-c="hero.headline_bottom"></span></h1>
      <div class="subtext" data-c="hero.subtext"></div>
      <a href="#contact" class="btn" data-c="hero.button_primary"></a>
      <a href="#about" class="btn secondary" data-c="hero.button_secondary"></a>
    </div>
  </header>

  <main id="sections"></main>

  <footer>
    <div class="container">
      <span class="logo">BLITZ<span style="color:var(--accent)">·</span>BAT WORKS</span>
      <div class="social-row" id="social-row"></div>
      <div class="footer-tag">© <span id="year"></span> Blitz Bat Works. <span data-c="footer_text"></span></div>
    </div>
  </footer>


  <script src="render.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    // Preview mode: don't auto-load JSON — parent playground renders into us.
    // But if opened directly, fall back to loading site.json:
    if (window === window.parent) {
      fetch('content/site.json?v=' + Date.now())
        .then(r => r.json())
        .then(data => BlitzRender.renderSite(data));
    }
  </script>
</body>
</html>
