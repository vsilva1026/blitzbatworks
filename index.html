<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blitz Bat Works — Custom Taped Wiffle Ball Bats</title>
  <meta name="description" content="Hand-taped custom wiffle ball bats built for backyard legends." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0f2a44;
      --primary-dark: #0a1d30;
      --accent: #d7263d;
      --bg: #f5efe0;
      --ink: #1a1a1a;
      --muted: #6b6b6b;
      --card: #ffffff;
      --heading-font: 'Bebas Neue', 'Inter', sans-serif;
      --body-font: 'Inter', system-ui, -apple-system, sans-serif;
    }
    [data-theme="navy-red"] { --primary:#0f2a44; --primary-dark:#0a1d30; --accent:#d7263d; --bg:#f5efe0; --card:#ffffff; }
    [data-theme="forest-gold"] { --primary:#1b3a2b; --primary-dark:#0f2318; --accent:#e0a020; --bg:#f4ecd8; --card:#ffffff; }
    [data-theme="black-yellow"] { --primary:#111111; --primary-dark:#000000; --accent:#ffcc00; --bg:#f2f2f2; --card:#ffffff; }
    [data-theme="royal-orange"] { --primary:#1e3a8a; --primary-dark:#152a63; --accent:#f97316; --bg:#f0f4ff; --card:#ffffff; }
    [data-theme="maroon-cream"] { --primary:#5e1522; --primary-dark:#3d0d16; --accent:#c9a96e; --bg:#f8f1e3; --card:#ffffff; }
    [data-theme="neon-retro"] { --primary:#1a1033; --primary-dark:#0d0820; --accent:#ff2ec4; --bg:#0d0820; --ink:#f0eaff; --muted:#a89dc7; --card:#1a1033; --heading-font:'Press Start 2P','Bebas Neue',sans-serif; }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--body-font);
      color: var(--ink);
      background: var(--bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, .display {
      font-family: var(--heading-font);
      letter-spacing: 0.02em;
      line-height: 1.05;
    }
    [data-theme="neon-retro"] h1, [data-theme="neon-retro"] h2, [data-theme="neon-retro"] h3 { line-height: 1.4; letter-spacing: 0; }
    a { color: inherit; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

    nav {
      position: sticky; top: 0; z-index: 10;
      background: var(--primary);
      color: var(--bg);
      padding: 16px 0;
      border-bottom: 3px solid var(--accent);
    }
    nav .container { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: var(--heading-font); font-size: 28px; letter-spacing: 0.08em; }
    [data-theme="neon-retro"] .logo { font-size: 14px; }
    .logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a { text-decoration: none; font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; }
    .nav-links a:hover { color: var(--accent); }
    @media (max-width: 600px) { .nav-links { display: none; } }

    .hero {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: var(--bg);
      padding: 96px 0 120px;
      position: relative;
      overflow: hidden;
    }
    .hero.has-bg::after {
      content: ""; position: absolute; inset: 0;
      background-image: var(--hero-bg);
      background-size: cover; background-position: center;
      opacity: 0.25; z-index: 0;
    }
    .hero::before {
      content: ""; position: absolute; top: -50%; right: -20%;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-content { position: relative; max-width: 720px; z-index: 1; }
    .kicker {
      display: inline-block;
      color: var(--accent);
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .hero h1 {
      font-size: clamp(48px, 8vw, 96px);
      margin-bottom: 20px;
    }
    [data-theme="neon-retro"] .hero h1 { font-size: clamp(24px, 4vw, 40px); }
    .hero h1 .accent { color: var(--accent); }
    .hero p {
      font-size: 20px; max-width: 560px; opacity: 0.9; margin-bottom: 36px;
    }
    .btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      padding: 16px 32px;
      text-decoration: none;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 14px;
      border-radius: 4px;
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .btn:hover { filter: brightness(0.9); transform: translateY(-2px); }
    .btn.secondary { background: transparent; border: 2px solid var(--bg); margin-left: 12px; }
    .btn.secondary:hover { background: var(--bg); color: var(--primary); }

    section { padding: 96px 0; }
    section.hidden { display: none; }
    .section-label {
      color: var(--accent);
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    section h2 {
      font-size: clamp(40px, 6vw, 64px);
      color: var(--primary);
      margin-bottom: 32px;
    }
    [data-theme="neon-retro"] section h2 { font-size: clamp(20px, 3vw, 32px); color: var(--accent); }

    .about-grid {
      display: grid; grid-template-columns: 1.2fr 1fr;
      gap: 64px; align-items: center;
    }
    @media (max-width: 800px) { .about-grid { grid-template-columns: 1fr; gap: 40px; } }
    .about-body p { font-size: 18px; margin-bottom: 20px; }
    .about-body ul, .about-body ol { margin: 0 0 20px 24px; font-size: 18px; }
    .about-body a { color: var(--accent); text-decoration: underline; }
    .about-card {
      background: var(--primary);
      color: var(--bg);
      padding: 40px;
      border-radius: 8px;
      border-left: 6px solid var(--accent);
    }
    .about-card h3 { font-size: 32px; margin-bottom: 20px; color: var(--bg); }
    [data-theme="neon-retro"] .about-card h3 { font-size: 16px; }
    .stat-row { display: flex; gap: 32px; margin-top: 24px; }
    .stat .num { font-family: var(--heading-font); font-size: 44px; color: var(--accent); line-height: 1; }
    [data-theme="neon-retro"] .stat .num { font-size: 20px; }
    .stat .lbl { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.8; }

    .featured { background: var(--card); }
    .featured-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; }
    @media (max-width: 800px) { .featured-inner { grid-template-columns: 1fr; } }
    .featured-photo { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 8px; border: 4px solid var(--accent); background: var(--bg); }
    .featured h3 { font-size: 42px; color: var(--primary); margin-bottom: 16px; }
    [data-theme="neon-retro"] .featured h3 { font-size: 20px; color: var(--accent); }
    .featured p { font-size: 18px; color: var(--muted); }

    .products { background: var(--card); }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      margin-top: 40px;
    }
    .product-card {
      background: var(--bg);
      padding: 0;
      border-radius: 8px;
      border-top: 4px solid var(--accent);
      overflow: hidden;
      display: flex; flex-direction: column;
    }
    .product-card .photo { width: 100%; aspect-ratio: 4/3; object-fit: cover; background: rgba(0,0,0,0.05); }
    .product-card .body { padding: 24px 32px 32px; }
    .product-card h3 {
      font-size: 28px; color: var(--primary); margin-bottom: 12px;
    }
    [data-theme="neon-retro"] .product-card h3 { font-size: 14px; color: var(--accent); }
    .product-card p { color: var(--muted); font-size: 15px; }

    .gallery { background: var(--bg); }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 40px;
    }
    .gallery-grid img {
      width: 100%; aspect-ratio: 1;
      object-fit: cover;
      border-radius: 6px;
      border: 3px solid var(--card);
      transition: transform 0.2s ease;
    }
    .gallery-grid img:hover { transform: scale(1.03); }

    .testimonials { background: var(--card); }
    .testi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-top: 40px;
    }
    .testi-card {
      background: var(--bg);
      padding: 32px;
      border-radius: 8px;
      border-left: 4px solid var(--accent);
    }
    .testi-card blockquote {
      font-size: 18px; font-style: italic; color: var(--ink); margin-bottom: 16px;
    }
    .testi-card .who {
      font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); font-weight: 800;
    }

    .contact { background: var(--primary); color: var(--bg); }
    .contact h2 { color: var(--bg); }
    [data-theme="neon-retro"] .contact h2 { color: var(--accent); }
    .contact-wrap { max-width: 560px; }
    .contact p { font-size: 18px; margin-bottom: 32px; opacity: 0.9; }
    form { display: grid; gap: 16px; }
    label { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 800; }
    input, textarea {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: var(--bg);
      font-family: inherit;
      font-size: 16px;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); background: rgba(255,255,255,0.12); }
    textarea { resize: vertical; min-height: 120px; }
    form .btn { border: none; cursor: pointer; margin-top: 8px; justify-self: start; }

    footer {
      background: var(--primary-dark);
      color: var(--bg);
      padding: 32px 0;
      text-align: center;
      font-size: 14px;
    }
    footer .logo { font-size: 20px; margin-bottom: 12px; display: block; }
    .social-row { margin: 12px 0; display: flex; justify-content: center; gap: 20px; }
    .social-row a { color: var(--bg); text-decoration: none; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 800; opacity: 0.8; }
    .social-row a:hover { color: var(--accent); opacity: 1; }
    .footer-tag { opacity: 0.6; }
  </style>
</head>
<body data-theme="navy-red">

  <nav>
    <div class="container">
      <div class="logo">BLITZ<span>·</span>BAT WORKS</div>
      <div class="nav-links">
        <a href="#about">About</a>
        <a href="#bats">Bats</a>
        <a href="#gallery">Gallery</a>
        <a href="#contact">Contact</a>
      </div>
    </div>
  </nav>

  <header class="hero" id="hero">
    <div class="container hero-content">
      <span class="kicker" data-c="hero.kicker"></span>
      <h1><span data-c="hero.headline_top"></span><br><span class="accent" data-c="hero.headline_bottom"></span></h1>
      <p data-c="hero.subtext"></p>
      <a href="#contact" class="btn" data-c="hero.button_primary"></a>
      <a href="#about" class="btn secondary" data-c="hero.button_secondary"></a>
    </div>
  </header>

  <section id="about" class="about">
    <div class="container">
      <div class="about-grid">
        <div>
          <div class="section-label">About</div>
          <h2 data-c="about.heading"></h2>
          <div class="about-body" data-c="about.body"></div>
        </div>
        <div class="about-card">
          <h3 data-c="about.card_heading"></h3>
          <p data-c="about.card_text"></p>
          <div class="stat-row">
            <div class="stat">
              <div class="num" data-c="about.stat_1_number"></div>
              <div class="lbl" data-c="about.stat_1_label"></div>
            </div>
            <div class="stat">
              <div class="num" data-c="about.stat_2_number"></div>
              <div class="lbl" data-c="about.stat_2_label"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section id="featured" class="featured hidden">
    <div class="container">
      <div class="section-label">Spotlight</div>
      <h2 data-c="featured.heading"></h2>
      <div class="featured-inner">
        <img class="featured-photo" id="featured-photo" alt="" />
        <div>
          <h3 data-c="featured.name"></h3>
          <p data-c="featured.description"></p>
        </div>
      </div>
    </div>
  </section>

  <section id="bats" class="products">
    <div class="container">
      <div class="section-label">The Lineup</div>
      <h2 data-c="products_heading"></h2>
      <div class="product-grid" id="product-grid"></div>
    </div>
  </section>

  <section id="gallery" class="gallery hidden">
    <div class="container">
      <div class="section-label">Gallery</div>
      <h2 data-c="gallery.heading"></h2>
      <p style="max-width:560px;font-size:18px;color:var(--muted);" data-c="gallery.subtext"></p>
      <div class="gallery-grid" id="gallery-grid"></div>
    </div>
  </section>

  <section id="testimonials" class="testimonials hidden">
    <div class="container">
      <div class="section-label">Reviews</div>
      <h2 data-c="testimonials.heading"></h2>
      <div class="testi-grid" id="testi-grid"></div>
    </div>
  </section>

  <section id="contact" class="contact">
    <div class="container contact-wrap">
      <div class="section-label">Contact</div>
      <h2 data-c="contact.heading"></h2>
      <p data-c="contact.subtext"></p>
      <form id="contact-form" method="POST">
        <div><label for="name">Your Name</label><input type="text" id="name" name="name" required /></div>
        <div><label for="email">Email</label><input type="email" id="email" name="email" required /></div>
        <div><label for="message">What kind of bat do you want?</label><textarea id="message" name="message" placeholder="Colors, style, quantity, anything else..." required></textarea></div>
        <button type="submit" class="btn" data-c="contact.button_label"></button>
      </form>
    </div>
  </section>

  <footer>
    <div class="container">
      <span class="logo">BLITZ<span style="color:var(--accent)">·</span>BAT WORKS</span>
      <div class="social-row" id="social-row"></div>
      <div class="footer-tag">© <span id="year"></span> Blitz Bat Works. <span data-c="footer_text"></span></div>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    function getPath(obj, path) {
      return path.split('.').reduce((o, k) => (o ? o[k] : undefined), obj);
    }

    function normalizeMedia(path) {
      if (!path) return '';
      if (/^https?:\/\//.test(path)) return path;
      if (path.startsWith('/')) return path;
      return '/' + path.replace(/^\.?\//, '');
    }

    fetch('content/site.json?v=' + Date.now())
      .then(r => r.json())
      .then(data => {
        document.body.setAttribute('data-theme', data.theme || 'navy-red');

        document.querySelectorAll('[data-c]').forEach(el => {
          const val = getPath(data, el.getAttribute('data-c'));
          if (val !== undefined && val !== null) el.innerHTML = val;
        });

        if (data.hero && data.hero.background_image) {
          const hero = document.getElementById('hero');
          hero.style.setProperty('--hero-bg', `url("${normalizeMedia(data.hero.background_image)}")`);
          hero.classList.add('has-bg');
        }

        if (data.featured && data.featured.enabled && data.featured.name) {
          const s = document.getElementById('featured');
          s.classList.remove('hidden');
          const img = document.getElementById('featured-photo');
          if (data.featured.photo) img.src = normalizeMedia(data.featured.photo);
          else img.style.display = 'none';
        }

        const grid = document.getElementById('product-grid');
        (data.products || []).forEach(prod => {
          const card = document.createElement('div');
          card.className = 'product-card';
          const photoHtml = prod.photo ? `<img class="photo" src="${normalizeMedia(prod.photo)}" alt="${prod.name}">` : '';
          card.innerHTML = `${photoHtml}<div class="body"><h3>${prod.name}</h3><p>${prod.description}</p></div>`;
          grid.appendChild(card);
        });

        if (data.gallery && data.gallery.enabled && (data.gallery.images || []).length) {
          const gs = document.getElementById('gallery');
          gs.classList.remove('hidden');
          const gg = document.getElementById('gallery-grid');
          data.gallery.images.forEach(img => {
            const el = document.createElement('img');
            el.src = normalizeMedia(img);
            el.alt = 'Custom wiffle bat';
            gg.appendChild(el);
          });
        }

        if (data.testimonials && data.testimonials.enabled && (data.testimonials.items || []).length) {
          const ts = document.getElementById('testimonials');
          ts.classList.remove('hidden');
          const tg = document.getElementById('testi-grid');
          data.testimonials.items.forEach(t => {
            const el = document.createElement('div');
            el.className = 'testi-card';
            el.innerHTML = `<blockquote>"${t.quote}"</blockquote><div class="who">— ${t.author}</div>`;
            tg.appendChild(el);
          });
        }

        const sr = document.getElementById('social-row');
        const links = [];
        if (data.social && data.social.instagram) links.push(`<a href="${data.social.instagram}" target="_blank" rel="noopener">Instagram</a>`);
        if (data.social && data.social.tiktok) links.push(`<a href="${data.social.tiktok}" target="_blank" rel="noopener">TikTok</a>`);
        if (data.social && data.social.email) links.push(`<a href="mailto:${data.social.email}">Email</a>`);
        sr.innerHTML = links.join('');

        const form = document.getElementById('contact-form');
        if (data.contact && data.contact.form_endpoint) form.action = data.contact.form_endpoint;
      });
  </script>
</body>
</html>
